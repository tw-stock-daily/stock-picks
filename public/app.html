<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>台股精選</title>

<style>
body{
  margin:0;
  background:#061222;
  color:#fff;
  font-family:"Noto Sans TC","Microsoft JhengHei";
}

.app{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:#0b1f35;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  border:1px solid #2b3f5a;
}

.title{
  color:#f6c453;
  font-size:28px;
  font-weight:900;
  margin-bottom:12px;
}

.text{
  color:#cbd5e1;
  line-height:1.6;
  margin-bottom:12px;
}

/* 🔥 盤勢改直式 */
.market-item{
  margin-bottom:10px;
  font-size:20px;
}

.up{color:#4ade80}
.down{color:#fb7185}
.muted{color:#94a3b8}

/* 🔥 股票卡 */
.stock{
  border:2px solid #f6c453;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}

.name{
  font-size:32px;
  font-weight:900;
}

.code{
  color:#94a3b8;
  margin-bottom:8px;
}

.score{
  margin-bottom:10px;
}

/* 🔥 TAG */
.tags{
  margin-bottom:12px;
}
.tag{
  display:inline-block;
  border:1px solid #38bdf8;
  border-radius:999px;
  padding:4px 10px;
  margin:2px;
  font-size:14px;
}

/* 🔥 目標價改直式 */
.plan{
  margin-top:12px;
}

.plan-item{
  margin-bottom:12px;
  line-height:1.6;
}

.buy{color:#4ade80}
.tp1{color:#4ade80}
.tp2{color:#c084fc}
.stop{color:#fb7185}

/* 🔥 法人 */
.inst{
  margin-top:14px;
  padding-top:10px;
  border-top:1px solid #2b3f5a;
}

.inst-title{
  color:#f6c453;
  margin-bottom:6px;
}

.footer{
  text-align:center;
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>

<body>
<div class="app">

<!-- 盤勢 -->
<div class="card">
  <div class="title">🌙 盤勢分析</div>
  <div id="marketText" class="text">讀取中...</div>

  <div class="market-item">S&P500：<span id="sp500">--</span></div>
  <div class="market-item">NASDAQ：<span id="nasdaq">--</span></div>
  <div class="market-item">台指期：<span id="future" class="muted">待早盤更新</span></div>
</div>

<!-- 新聞 -->
<div class="card" id="newsCard" style="display:none;">
  <div class="title">📰 今日題材新聞</div>
  <div id="news"></div>
</div>

<!-- 股票 -->
<div class="card">
  <div class="title">👑 今日精選</div>
  <div id="stocks">載入中...</div>
</div>

<div class="footer">本內容僅供研究參考，不構成投資建議</div>

</div>

<script>
let data;

function pct(v){
  if(v==null)return "--";
  return (v>0?"+":"")+(v*100).toFixed(2)+"%";
}

function cls(v){
  if(v>0)return "up";
  if(v<0)return "down";
  return "";
}

/* 盤勢 */
async function loadMarket(){
  const m = await fetch("./market.json?t="+Date.now()).then(r=>r.json());

  document.getElementById("marketText").innerText =
    m.signal?.text || "";

  const sp = m.us?.sp500?.changePct;
  const nq = m.us?.nasdaq?.changePct;
  const ft = m.taiwan?.nightFuture?.changePct;

  let spEl = document.getElementById("sp500");
  spEl.innerText = pct(sp);
  spEl.className = cls(sp);

  let nqEl = document.getElementById("nasdaq");
  nqEl.innerText = pct(nq);
  nqEl.className = cls(nq);

  let ftEl = document.getElementById("future");
  if(ft==null || ft===0){
    ftEl.innerText="待早盤更新";
  }else{
    ftEl.innerText=pct(ft);
    ftEl.className=cls(ft);
  }
}

/* 新聞 */
function renderNews(){
  let box = document.getElementById("news");
  let items=[];

  (data.hotThemes||[]).forEach(t=>{
    (t.news||[]).forEach(n=>{
      items.push(`<div class="text">${n.title||n}</div>`);
    });
  });

  if(items.length){
    document.getElementById("newsCard").style.display="block";
    box.innerHTML = items.slice(0,5).join("");
  }
}

/* 股票 */
function renderStock(p){

  const plan = p.plan || {};

  return `
  <div class="stock">
    <div class="name">${p.name}</div>
    <div class="code">(${p.symbol})</div>
    <div class="score">分數：${p.score.toFixed(2)}</div>

    <div class="tags">
      ${(p.stockTags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
    </div>

    <div class="plan">
      <div class="plan-item buy">
        建議買進區：<br>
        ${plan.entryLow?.toFixed(2)} ~ ${plan.entryHigh?.toFixed(2)}
      </div>

      <div class="plan-item tp1">
        第一目標價（短線）：<br>
        ${plan.tp1?.toFixed(2)}
      </div>

      <div class="plan-item tp2">
        第二目標價（波段）：<br>
        ${plan.tp2?.toFixed(2)}
      </div>

      <div class="plan-item stop">
        停損價：<br>
        ${plan.stop?.toFixed(2)}
      </div>
    </div>

    <div class="inst">
      <div class="inst-title">三大法人近5日</div>
      外資：${p.inst?.sumForeign||0}<br>
      投信：${p.inst?.sumTrust||0}<br>
      自營商：${p.inst?.sumDealer||0}
    </div>
  </div>
  `;
}

async function loadToday(){
  data = await fetch("./today.json?t="+Date.now()).then(r=>r.json());
  renderNews();

  document.getElementById("stocks").innerHTML =
    data.picks.map(renderStock).join("");
}

loadMarket();
loadToday();
</script>

</body>
</html>
