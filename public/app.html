<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台股精選</title>

<style>
:root{
  --bg:#050b16;
  --card:#0b1b2d;
  --line:#334862;
  --gold:#f7c64b;
  --green:#4ade80;
  --purple:#c084fc;
  --red:#fb7185;
  --text:#f8fafc;
  --muted:#aab8ca;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:linear-gradient(180deg,#071426,#020617);
  color:var(--text);
  font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  font-size:20px;
}

.app{
  max-width:920px;
  margin:0 auto;
  padding:14px;
}

/* ===== 卡片 ===== */
.card{
  background:linear-gradient(145deg,#0f2238,#071426);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}

/* ===== 標題 ===== */
.title{
  font-size:34px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:12px;
}

/* ===== 盤勢 ===== */
.market-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.market-box{
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  text-align:center;
}

.market-label{
  font-size:20px;
  font-weight:900;
  margin-bottom:6px;
}

.market-value{
  font-size:32px;
  font-weight:1000;
}

.up{color:var(--green)}
.down{color:var(--red)}

/* ===== 按鈕 ===== */
.btn{
  background:linear-gradient(135deg,#facc15,#f59e0b);
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

/* ===== 股票卡 ===== */
.stock-card{
  border:2px solid rgba(247,198,75,.5);
  border-radius:22px;
  padding:18px;
  background:linear-gradient(145deg,#10243c,#071426);
}

.stock-name{
  font-size:40px;
  font-weight:1000;
}

.stock-code{
  font-size:28px;
  color:#cbd5f5;
}

.score{
  font-size:26px;
  margin-top:6px;
}

/* ===== 標籤 ===== */
.tags{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tag{
  font-size:16px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #38bdf8;
  background:#0b2942;
}

/* ===== 目標區 ===== */
.targets{
  margin-top:16px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.target{
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  text-align:center;
}

.target-label{
  font-size:18px;
  margin-bottom:6px;
}

.target-value{
  font-size:28px;
  font-weight:1000;
}

.green{color:var(--green)}
.purple{color:var(--purple)}
.red{color:var(--red)}

.note{
  margin-top:12px;
  font-size:18px;
  color:#fde68a;
}

.footer{
  text-align:center;
  font-size:16px;
  color:var(--muted);
  margin-top:20px;
}
</style>
</head>

<body>
<div class="app">

<div class="card">
  <div class="title">🌙 盤勢分析</div>
  <div id="marketText"></div>
  <div class="market-grid">
    <div class="market-box">
      <div class="market-label">S&P500</div>
      <div id="sp500" class="market-value">--</div>
    </div>
    <div class="market-box">
      <div class="market-label">NASDAQ</div>
      <div id="nasdaq" class="market-value">--</div>
    </div>
    <div class="market-box">
      <div class="market-label">台指期</div>
      <div id="future" class="market-value">--</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="title">👑 今日精選</div>
  <button class="btn" onclick="toggle()">🔄 重新整理</button>
  <div id="stocks"></div>
</div>

<div class="footer">投資有風險，請自行評估</div>

</div>

<script>
let data,alt=false;

function num(n){
  if(!n) return "--";
  return Number(n).toFixed(2);
}

function renderTags(p){
  let tags=[...(p.matchedThemes||[]),...(p.stockTags||[])];
  return tags.map(t=>`<div class="tag">${t}</div>`).join("");
}

function renderStock(p){
  return `
  <div class="stock-card">
    <div class="stock-name">${p.name}</div>
    <div class="stock-code">(${p.symbol})</div>
    <div class="score">分數：${p.score}</div>

    <div class="tags">${renderTags(p)}</div>

    <div class="targets">
      <div class="target">
        <div class="target-label">買進區</div>
        <div class="target-value">${num(p.plan.entryLow)}~${num(p.plan.entryHigh)}</div>
      </div>
      <div class="target">
        <div class="target-label green">第一目標</div>
        <div class="target-value green">${num(p.plan.tp1)}</div>
      </div>
      <div class="target">
        <div class="target-label purple">第二目標</div>
        <div class="target-value purple">${num(p.plan.tp2)}</div>
      </div>
      <div class="target">
        <div class="target-label red">停損</div>
        <div class="target-value red">${num(p.plan.stop)}</div>
      </div>
    </div>

    <div class="note">先在第一目標出場，剩餘續抱</div>
  </div>
  `;
}

function render(){
  let list=alt?data.alternates:data.picks;
  document.getElementById("stocks").innerHTML=list.map(renderStock).join("");
}

function toggle(){
  alt=!alt;
  render();
}

async function load(){
  data=await fetch("./today.json").then(r=>r.json());
  render();
}

async function loadMarket(){
  let m=await fetch("./market.json").then(r=>r.json());
  document.getElementById("marketText").innerText=m.signal.text;
  document.getElementById("sp500").innerText=(m.us.sp500.changePct*100).toFixed(2)+"%";
  document.getElementById("nasdaq").innerText=(m.us.nasdaq.changePct*100).toFixed(2)+"%";
  document.getElementById("future").innerText=m.taiwan.nightFuture?.changePct? (m.taiwan.nightFuture.changePct*100).toFixed(2)+"%":"--";
}

load();
loadMarket();
</script>

</body>
</html>
