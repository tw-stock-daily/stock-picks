<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股精選</title>

<style>
body { font-family: Arial; background:#f5f6f8; margin:0; }
.app { max-width:900px; margin:auto; padding:20px; }

.card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.title { font-size:22px; font-weight:bold; margin-bottom:10px; }

.stat-row { margin-bottom:6px; font-size:15px; }
.stat { font-size:20px; font-weight:bold; }

.pick {
  border:1px solid #eee;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.pick-title {
  font-size:18px;
  font-weight:bold;
}

.gray { color:#666; }

.plan {
  margin-top:10px;
  background:#fafafa;
  padding:10px;
  border-radius:10px;
}

.plan div {
  margin-bottom:4px;
}
</style>
</head>

<body>
<div class="app">

<!-- ====== 統計 ====== -->
<div class="card">
  <div class="title">📊 績效統計</div>
  <div class="stat-row">樣本數：<span id="statSamples">--</span></div>
  <div class="stat-row">TP1 (+3%)：<span id="statTp1">--</span></div>
  <div class="stat-row">TP2 (+5%)：<span id="statTp2">--</span></div>
  <div class="stat-row">每日命中：<span id="statDaily">--</span></div>
</div>

<!-- ====== 今日推薦 ====== -->
<div class="card">
  <div class="title">📈 今日推薦</div>
  <div id="picks">載入中...</div>
</div>

</div>

<script>
const TODAY_URL = "./today.json";
const STATS_URL = "./stats.json";

function pct(n){
  return (n*100).toFixed(2) + "%";
}

async function fetchJson(url){
  const r = await fetch(url + "?t=" + Date.now());
  return await r.json();
}

/* ====== 統計（支援新舊版本）====== */
async function loadStats(){
  try{
    const s = await fetchJson(STATS_URL);

    const samples =
      s.totalSamples ??
      s.total_samples ??
      "--";

    const tp1 =
      s.tp1?.hitRate ??
      s.d5_tp1_rate ??
      null;

    const tp2 =
      s.tp2?.hitRate ??
      s.d5_tp2_rate ??
      null;

    const daily =
      s.dailyHit?.tp2?.hitRate ??
      s.dailyHit?.tp1?.hitRate ??
      s.daily_hit_rate ??
      null;

    document.getElementById("statSamples").textContent = samples;
    document.getElementById("statTp1").textContent = tp1!=null ? pct(tp1) : "--";
    document.getElementById("statTp2").textContent = tp2!=null ? pct(tp2) : "--";
    document.getElementById("statDaily").textContent = daily!=null ? pct(daily) : "--";

  }catch(e){
    console.log("stats error", e);
  }
}

/* ====== 今日推薦（含 TP1 / TP2）====== */
async function loadToday(){
  try{
    const t = await fetchJson(TODAY_URL);
    const picks = t.picks || [];

    const box = document.getElementById("picks");

    if(!picks.length){
      box.innerHTML = "沒有資料";
      return;
    }

    box.innerHTML = picks.map(p=>`
      <div class="pick">
        <div class="pick-title">${p.name} (${p.symbol})</div>
        <div class="gray">${p.reason || ""}</div>

        <div class="plan">
          <div>收盤價：${p.lastClose ?? "--"}</div>
          <div>TP1：${p.plan?.tp1 ?? "--"}</div>
          <div>TP2：${p.plan?.tp2 ?? "--"}</div>
          <div>停損：${p.plan?.stop ?? "--"}</div>
        </div>
      </div>
    `).join("");

  }catch(e){
    document.getElementById("picks").innerHTML = "載入失敗";
  }
}

/* 初始化 */
loadStats();
loadToday();
</script>

</body>
</html>
