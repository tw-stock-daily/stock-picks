<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台股精選</title>

<style>
:root{
  --bg:#06111f;
  --panel:#0b1b2d;
  --line:#28445f;
  --text:#f8fafc;
  --muted:#9fb2c7;
  --gold:#f6c453;
  --blue:#38bdf8;
  --green:#4ade80;
  --purple:#c084fc;
  --red:#fb7185;
}

body{
  margin:0;
  background:linear-gradient(180deg,#06111f,#020617);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
  font-size:20px;
}

.app{max-width:900px;margin:auto;padding:16px}

.panel{
  background:var(--panel);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

.title{
  font-size:28px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:10px;
}

.small{color:var(--muted);font-size:16px}

.pick{
  border:1px solid #334155;
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}

.pick.main{
  border:2px solid var(--gold);
}

.stock-name{
  font-size:34px;
  font-weight:900;
}

.stock-code{
  font-size:24px;
  color:#cbd5f5;
}

.score{
  font-size:22px;
  color:var(--blue);
}

.price{
  font-size:30px;
  font-weight:900;
}

.tp1{color:var(--green)}
.tp2{color:var(--purple)}
.stop{color:var(--red)}

.entry{
  font-size:34px;
  font-weight:900;
  color:var(--green);
}

.btn{
  padding:12px 16px;
  border-radius:12px;
  background:var(--gold);
  border:none;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.market{
  font-size:20px;
  line-height:1.6;
}
</style>
</head>

<body>
<div class="app">

<div class="panel">
  <div class="title">📈 台股精選</div>
  <div id="dateText" class="small"></div>
  <div id="holidayNote" class="small"></div>
</div>

<div class="panel">
  <div class="title">🌙 盤勢分析</div>
  <div id="marketText" class="market"></div>
  <div id="marketNum" class="market"></div>
</div>

<div class="panel">
  <div class="title" id="pickTitle">👑 今日主推</div>
  <button class="btn" id="toggleBtn">🔄 重新整理</button>
  <div id="picks"></div>
</div>

</div>

<script>
const TODAY_URL="./today.json";
const MARKET_URL="./market.json";

let data=null;
let alt=false;

function num(n){return Number(n).toFixed(2)}

function isWeekend(date){
  const d=new Date(date);
  return d.getDay()==0||d.getDay()==6;
}

function renderHoliday(){
  if(isWeekend(data.date)){
    document.getElementById("holidayNote").innerText="今日為假日，資料沿用前一交易日";
  }
}

function renderMarket(m){
  document.getElementById("marketText").innerText=m.signal?.text||"";
  document.getElementById("marketNum").innerHTML=`
    S&P500：${m.us?.sp500?.changePct||"--"}<br>
    NASDAQ：${m.us?.nasdaq?.changePct||"--"}<br>
    台指期：${m.taiwan?.nightFuture?.changePct||"--"}
  `;
}

function mainCard(p){
  return `
    <div class="pick main">
      <div class="stock-name">${p.name}</div>
      <div class="stock-code">${p.symbol}</div>
      <div class="score">分數：${p.score}</div>

      <div style="margin-top:10px">
        <b>🎯 今日操作</b><br>
        建議買進區：<div class="entry">${num(p.plan.entryLow)} ~ ${num(p.plan.entryHigh)}</div>

        第一目標價：<span class="price tp1">${num(p.plan.tp1)}</span><br>
        第二目標價：<span class="price tp2">${num(p.plan.tp2)}</span><br>
        停損價：<span class="price stop">${num(p.plan.stop)}</span><br>

        <div class="small">先在第一目標出場，其餘續抱</div>
      </div>
    </div>
  `;
}

function normalCard(p){
  return `
    <div class="pick">
      <div class="stock-name">${p.name}</div>
      <div class="stock-code">${p.symbol}</div>

      第一目標價：<span class="price tp1">${num(p.tp1)}</span><br>
      第二目標價：<span class="price tp2">${num(p.tp2)}</span><br>
      停損價：<span class="price stop">${num(p.stop)}</span>
    </div>
  `;
}

function render(){
  const list=alt?data.alternates:data.picks;
  let html="";
  list.forEach((p,i)=>{
    html+= (i===0&&!alt)?mainCard(p):normalCard(p);
  });
  document.getElementById("picks").innerHTML=html;
  document.getElementById("pickTitle").innerText=alt?"備選股":"今日主推";
}

async function load(){
  data=await fetch(TODAY_URL+"?t="+Date.now()).then(r=>r.json());
  document.getElementById("dateText").innerText=data.date;
  renderHoliday();
  render();
}

async function loadMarket(){
  const m=await fetch(MARKET_URL+"?t="+Date.now()).then(r=>r.json());
  renderMarket(m);
}

document.getElementById("toggleBtn").onclick=()=>{
  alt=!alt;
  render();
};

load();
loadMarket();
</script>

</body>
</html>
