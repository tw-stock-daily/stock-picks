<!-- ====== 主推策略區（已白話化）====== -->
<script>
function renderMainDecision(p,plan){
  return `
    <div class="decision">
      <div class="decision-title">🎯 今日操作重點</div>
      <div class="decision-text">${firstDecisionText(p)}</div>
    </div>

    <div class="entry-zone">
      <div class="entry-card">
        <div class="entry-label">建議買進區</div>
        <div class="entry-value">${num(plan.entryLow,2)} ～ ${num(plan.entryHigh,2)}</div>
      </div>

      <div class="strategy-card">
        <div class="price-grid" style="margin-top:0; grid-template-columns:repeat(3,1fr);">
          
          <div>
            <div class="price-label">第一目標價（短線）</div>
            <div class="price-value tp1">${num(plan.tp1,2)}</div>
          </div>

          <div>
            <div class="price-label">第二目標價（波段）</div>
            <div class="price-value tp2">${num(plan.tp2,2)}</div>
          </div>

          <div>
            <div class="price-label">停損價</div>
            <div class="price-value stop">${num(plan.stop,2)}</div>
          </div>

        </div>

        <div style="margin-top:12px; font-size:16px; color:#fde68a;">
          建議：先在第一目標價分批出場，其餘視強度續抱至第二目標價
        </div>

      </div>
    </div>
  `;
}
</script>

<!-- ====== 一般卡片區（同步白話）====== -->
<script>
function renderPick(p,index,alt=false){
  const rank=p.rank??(alt?index+4:index+1);
  const isMain=rank===1&&!alt;
  const plan=getPlan(p);

  return `
    <article class="pick ${isMain?"main":""}">
      ${isMain?`<div class="main-badge">🥇 今日主推｜系統最高分</div>`:""}

      <div class="pick-head">
        <div class="stock-line">
          <div class="rank ${alt?"alt":""}">${rank}</div>
          <div>
            <div class="stock-name">${p.name||"--"}</div>
            <div class="stock-code">${p.symbol||"--"}</div>
          </div>
        </div>
        <div class="score">
          <small>分數</small>
          <b>${num(p.score,1)}</b>
        </div>
      </div>

      ${isMain ? renderMainDecision(p,plan) : ""}

      ${!isMain ? `
        <div class="price-grid">

          <div class="price-card">
            <div class="price-label">收盤價</div>
            <div class="price-value close">${num(plan.close,2)}</div>
          </div>

          <div class="price-card">
            <div class="price-label">第一目標價</div>
            <div class="price-value tp1">${num(plan.tp1,2)}</div>
          </div>

          <div class="price-card">
            <div class="price-label">第二目標價</div>
            <div class="price-value tp2">${num(plan.tp2,2)}</div>
          </div>

          <div class="price-card">
            <div class="price-label">停損價</div>
            <div class="price-value stop">${num(plan.stop,2)}</div>
          </div>

        </div>

        <div style="margin-top:10px; font-size:15px; color:#9fb2c7;">
          短線先看第一目標價，強勢續抱至第二目標價
        </div>
      ` : ""}

    </article>
  `;
}
</script>
