<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股精選 v3.8B2</title>

  <style>
    :root{
      --bg:#0f1220;
      --card:#171a2f;
      --line:#262a4a;
      --text:#e9ecff;
      --muted:#9aa0ff;
      --pill:#2a2f66;
      --accent:#7aa2ff;
      --btn:#1f2350;
      --good:#39d98a;
      --warn:#ffd66b;
      --bad:#ff6b6b;
      --hot:#ff9f43;
      --hotBg:rgba(255,159,67,.12);
      --hotLine:rgba(255,159,67,.32);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:
        calc(16px + env(safe-area-inset-top, 0px))
        14px
        calc(16px + env(safe-area-inset-bottom, 0px))
        14px;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC",sans-serif;
      font-size:16px;
      line-height:1.55;
    }
    h1{ font-size:1.35rem; margin:0 0 8px; }
    .small{ font-size:0.9rem; color:var(--muted); }
    .muted{ color:var(--muted); }
    .wrap{ max-width:860px; margin:0 auto; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .pill{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      background:var(--pill);
      font-size:0.85rem;
      white-space:nowrap;
      border:1px solid transparent;
    }
    .pill.good{ background:rgba(57,217,138,.18); color:var(--good); border-color:rgba(57,217,138,.35); }
    .pill.warn{ background:rgba(255,214,107,.18); color:var(--warn); border-color:rgba(255,214,107,.35); }
    .pill.bad{ background:rgba(255,107,107,.18); color:var(--bad); border-color:rgba(255,107,107,.35); }
    .pill.hot{ background:var(--hotBg); color:var(--hot); border-color:var(--hotLine); }
    .pill.soft{ background:rgba(122,162,255,.1); color:#b9c9ff; border-color:rgba(122,162,255,.25); }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:10px;
    }

    select, button{
      width:100%;
      max-width:260px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--btn);
      color:var(--text);
      font-size:1rem;
    }
    button{ cursor:pointer; }
    button:disabled{ opacity:.65; cursor:default; }

    .pick{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
    }

    .pickHeader{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .lineTop, .lineScore{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:baseline;
      min-width:0;
    }

    .topLeft{
      display:flex;
      gap:10px;
      align-items:baseline;
      min-width:0;
      flex:1;
    }

    .idxCode{
      font-size:1.05rem;
      font-weight:900;
      white-space:nowrap;
      flex-shrink:0;
    }

    .stockName{
      font-size:1.05rem;
      font-weight:850;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      flex:1;
    }

    .scoreLabel{
      font-size:0.9rem;
      font-weight:800;
      color:var(--muted);
      white-space:nowrap;
      flex-shrink:0;
    }

    .scoreValue{
      font-size:1.15rem;
      font-weight:950;
      white-space:nowrap;
      flex-shrink:0;
      margin-left:10px;
    }

    .pickMeta{
      font-size:0.88rem;
      color:var(--muted);
      margin-top:2px;
      display:flex;
      flex-wrap:wrap;
      gap:6px 8px;
      align-items:center;
    }

    .chipWrap{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .hotThemeList, .bucketList{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .hotItem, .bucketItem{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      background:rgba(255,255,255,.02);
    }

    .hotHead{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .hotTitle{
      font-weight:850;
      font-size:1rem;
    }

    .hotNews{
      display:grid;
      gap:6px;
      margin-top:8px;
    }

    .hotNewsItem{
      font-size:0.9rem;
      color:var(--muted);
      border-left:2px solid rgba(122,162,255,.3);
      padding-left:8px;
    }

    .hotNewsItem a{
      color:#c8d7ff;
      text-decoration:none;
    }
    .hotNewsItem a:hover{
      text-decoration:underline;
    }

    details{ margin-top:10px; }
    summary{
      cursor:pointer;
      font-size:0.92rem;
      color:var(--accent);
      margin-bottom:6px;
    }

    .kv{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:8px 10px;
      font-size:0.92rem;
    }
    .kv div:nth-child(odd){ color:var(--muted); }

    .hr{ height:1px; background:var(--line); margin:10px 0; }

    #emptyHint, #themeEmptyHint{
      display:none;
      padding:12px;
      border-radius:12px;
      border:1px dashed rgba(154,160,255,.45);
      color:var(--muted);
    }

    .sectionTitle{
      font-weight:800;
      margin-bottom:8px;
    }

    @media (max-width:420px){
      body{ font-size:17px; }
      .idxCode{ font-size:1.07rem; }
      .stockName{ font-size:1.07rem; }
      .scoreValue{ font-size:1.18rem; }
      .kv{ grid-template-columns:100px 1fr; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>台股精選</h1>
  <div class="small muted" id="updated">更新時間：—</div>

  <div class="card">
    <div class="row">
      <div style="font-weight:800;">今日盤勢燈號</div>
      <div id="marketPill" class="pill">—</div>
    </div>
    <div class="small muted" id="marketMeta" style="margin-top:6px;">尚未更新</div>
    <div style="margin-top:8px;" id="marketMsg">—</div>
    <div class="small muted" id="marketNote" style="margin-top:8px;"></div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div style="font-weight:800;">今日主流題材</div>
        <div class="small muted" id="themeSub">依新聞熱度整理</div>
      </div>
      <div class="pill hot">HOT THEMES</div>
    </div>
    <div id="themeEmptyHint" style="margin-top:10px;">目前尚未抓到熱門題材。</div>
    <div id="hotThemeList" class="hotThemeList"></div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div style="font-weight:800;">主推 TOP 3</div>
        <div class="small muted" id="pickSub">—</div>
      </div>
      <div class="pill">TOP 3</div>
    </div>

    <div class="controls">
      <select id="bucketSel">
        <option value="all">不限（主推區塊過濾）</option>
        <option value="lt100">100 以內</option>
        <option value="100_300">100 ~ 300</option>
        <option value="300_600">300 ~ 600</option>
        <option value="600_1000">600 ~ 1000</option>
        <option value="gt1000">1000 以上</option>
      </select>
      <button id="btnRefresh">重新整理</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div style="font-weight:800;">分價推薦</div>
        <div class="small muted">依資金規模選股</div>
      </div>
      <div class="pill soft">BUCKET PICKS</div>
    </div>
    <div id="bucketList" class="bucketList"></div>
  </div>

  <div id="emptyHint">目前沒有符合條件的推薦。</div>
  <div id="pickList"></div>
</div>

<script>
const REMOTE_BASE = "https://tw-stock-daily.github.io/stock-picks/";
const BASE = (location.protocol === "file:")
  ? REMOTE_BASE
  : new URL("./", location.href).href;

const TODAY_URL  = BASE + "today.json";
const MARKET_URL = BASE + "market.json";

function el(id){ return document.getElementById(id); }
function fmt(n,d=2){ return (n==null||isNaN(n))?null:Number(n).toFixed(d); }
function fmtInt(n){ return (n==null||isNaN(n))?null:String(Math.round(Number(n))); }
function sign(n){ n=Number(n); return n>0?"+":(n<0?"-":""); }
function escapeHtml(str){
  return String(str ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}
function arrText(arr, empty="—"){
  return Array.isArray(arr) && arr.length ? arr.join(" / ") : empty;
}
function bucketLabel(key){
  return ({
    lt100: "100 以下",
    "100_300": "100 ~ 300",
    "300_600": "300 ~ 600",
    "600_1000": "600 ~ 1000",
    gt1000: "1000 以上"
  })[key] || key;
}
function bucketOf(p){
  p=Number(p); if(!isFinite(p))return"unknown";
  if(p<100)return"lt100";
  if(p<300)return"100_300";
  if(p<600)return"300_600";
  if(p<1000)return"600_1000";
  return"gt1000";
}
function inBucket(p,b){ return b==="all"||bucketOf(p)===b; }

let lastToday = null;

function renderThemeList(hotThemes){
  const list = el("hotThemeList");
  const hint = el("themeEmptyHint");
  const themes = Array.isArray(hotThemes) ? hotThemes : [];
  list.innerHTML = "";

  if(!themes.length){
    hint.style.display = "block";
    el("themeSub").textContent = "今日尚未抓到題材";
    return;
  }

  hint.style.display = "none";
  el("themeSub").textContent = `共 ${themes.length} 個熱門題材`;

  themes.forEach((t, idx) => {
    const div = document.createElement("div");
    div.className = "hotItem";

    const newsHtml = Array.isArray(t.news) && t.news.length
      ? `<div class="hotNews">
          ${t.news.slice(0,3).map(n => `
            <div class="hotNewsItem">
              ${n.link
                ? `<a href="${escapeHtml(n.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(n.title || "新聞連結")}</a>`
                : escapeHtml(n.title || "—")
              }
            </div>
          `).join("")}
        </div>`
      : `<div class="small muted">暫無新聞摘要</div>`;

    div.innerHTML = `
      <div class="hotHead">
        <div>
          <div class="hotTitle">#${idx+1} ${escapeHtml(t.theme || "—")}</div>
          <div class="small muted">新聞熱度分數</div>
        </div>
        <div class="pill hot">${fmt(t.score,2) ?? "—"}</div>
      </div>
      ${newsHtml}
    `;
    list.appendChild(div);
  });
}

function renderPickCard(p, i){
  const scoreText = (p.score !== undefined && p.score !== null) ? fmt(p.score,4) : "-";
  const baseScoreText = fmt(p.baseScore,3) ?? "—";
  const instScoreText = fmt(p.instScore,3) ?? "—";
  const themeScoreText = fmt(p.themeScore,3) ?? "—";
  const topTheme = p.theme || (Array.isArray(p.matchedThemes) && p.matchedThemes[0]) || "—";

  const tagsHtml = (p.stockTags || []).slice(0,5).map(x => `<span class="pill soft">${escapeHtml(x)}</span>`).join("");
  const themesHtml = (p.matchedThemes || []).slice(0,4).map(x => `<span class="pill hot">${escapeHtml(x)}</span>`).join("");
  const rolesHtml = (p.industryRoles || []).slice(0,4).map(x => `<span class="pill">${escapeHtml(x)}</span>`).join("");

  return `
    <div class="pickHeader">
      <div class="lineTop">
        <div class="topLeft">
          <div class="idxCode">#${i+1} ${escapeHtml(p.symbol || "—")}</div>
          <div class="stockName">${escapeHtml(p.name || "—")}</div>
        </div>
      </div>

      <div class="lineScore">
        <div class="scoreLabel">綜合評分</div>
        <div class="scoreValue">${scoreText}</div>
      </div>

      <div class="pickMeta">
        <span>${escapeHtml(p.reason || "—")}</span>
        <span>｜</span>
        <span>操作：<span class="pill">${escapeHtml(p.tradeStyle || "—")}</span></span>
      </div>

      <div class="chipWrap">
        <span class="pill hot">主題：${escapeHtml(topTheme)}</span>
        <span class="pill soft">題材分：${themeScoreText}</span>
        <span class="pill soft">技術分：${baseScoreText}</span>
        <span class="pill soft">法人分：${instScoreText}</span>
        <span class="pill soft">價格：${fmt(p.lastClose,2) ?? "—"}</span>
      </div>

      ${(themesHtml || tagsHtml || rolesHtml) ? `
        <div class="chipWrap">
          ${themesHtml}
          ${tagsHtml}
          ${rolesHtml}
        </div>
      ` : ""}
    </div>

    <details>
      <summary>看詳情（技術 / 題材 / 交易計畫 / 法人）</summary>

      <div class="sectionTitle">技術面</div>
      <div class="kv">
        <div>收盤價</div><div>${fmt(p.lastClose,2) ?? "尚未提供"}</div>
        <div>MA5 / MA10 / MA20</div><div>${(fmt(p.ma5,2) && fmt(p.ma10,2) && fmt(p.ma20,2)) ? (fmt(p.ma5,2) + " / " + fmt(p.ma10,2) + " / " + fmt(p.ma20,2)) : "尚未提供"}</div>
        <div>RSI14</div><div>${fmt(p.rsi14,1) ?? "尚未提供"}</div>
        <div>量比</div><div>${fmt(p.volRatio,2) ?? "尚未提供"}</div>
        <div>MACD</div><div>${(fmt(p.macdDif,4) && fmt(p.macdDea,4) && fmt(p.macdHist,4))
          ? `DIF ${fmt(p.macdDif,4)} / DEA ${fmt(p.macdDea,4)} / Hist ${fmt(p.macdHist,4)}`
          : "尚未提供"}</div>
      </div>

      <div class="hr"></div>

      <div class="sectionTitle">題材面</div>
      <div class="kv">
        <div>主流題材</div><div>${escapeHtml(topTheme)}</div>
        <div>命中主題</div><div>${arrText((p.matchedThemes || []).map(escapeHtml), "尚未提供")}</div>
        <div>股票標籤</div><div>${arrText((p.stockTags || []).map(escapeHtml), "尚未提供")}</div>
        <div>產業鏈位置</div><div>${arrText((p.industryRoles || []).map(escapeHtml), "尚未提供")}</div>
        <div>題材理由</div><div>${arrText((p.matchedThemeReasons || []).map(escapeHtml), "尚未提供")}</div>
      </div>

      <div class="hr"></div>

      <div class="sectionTitle">交易計畫</div>
      <div class="kv">
        <div>進場區間</div><div>${(p.plan && fmt(p.plan.entryLow,2) && fmt(p.plan.entryHigh,2)) ? (fmt(p.plan.entryLow,2) + " ~ " + fmt(p.plan.entryHigh,2)) : "尚未提供"}</div>
        <div>止損</div><div>${(p.plan && fmt(p.plan.stop,2)) ? fmt(p.plan.stop,2) : "尚未提供"}</div>
        <div>TP1 / TP2</div><div>${(p.plan && fmt(p.plan.tp1,2) && fmt(p.plan.tp2,2)) ? (fmt(p.plan.tp1,2) + " / " + fmt(p.plan.tp2,2)) : "尚未提供"}</div>
      </div>

      <div class="hr"></div>

      <div class="sectionTitle">法人摘要</div>
      <div class="kv">
        <div>法人（T86）</div><div>${p.inst?.windowDays ? `近 ${p.inst.windowDays} 日摘要` : "尚未提供"}</div>
        <div>合計淨買</div><div>${p.inst?.sumTotal != null ? `${sign(p.inst.sumTotal)}${fmtInt(p.inst.sumTotal)}` : "尚未提供"}</div>
        <div>外資 / 投信 / 自營</div><div>${(p.inst?.sumForeign!=null && p.inst?.sumTrust!=null && p.inst?.sumDealer!=null)
          ? `${sign(p.inst.sumForeign)}${fmtInt(p.inst.sumForeign)} / ${sign(p.inst.sumTrust)}${fmtInt(p.inst.sumTrust)} / ${sign(p.inst.sumDealer)}${fmtInt(p.inst.sumDealer)}`
          : "尚未提供"}</div>
        <div>連買 / 最新一日</div><div>${(p.inst?.buyStreak!=null && p.inst?.latestTotalNet!=null)
          ? `${p.inst.buyStreak} 日 / ${sign(p.inst.latestTotalNet)}${fmtInt(p.inst.latestTotalNet)}`
          : "尚未提供"}</div>
      </div>
    </details>
  `;
}

function renderBucketList(bucketPicks){
  const wrap = el("bucketList");
  wrap.innerHTML = "";

  const order = ["lt100","100_300","300_600","600_1000","gt1000"];

  order.forEach(key => {
    const arr = bucketPicks?.[key] || [];
    const div = document.createElement("div");
    div.className = "bucketItem";
    div.innerHTML = `
      <div class="row">
        <div style="font-weight:800;">${bucketLabel(key)}</div>
        <div class="pill soft">${arr.length} 檔</div>
      </div>
      <div style="margin-top:8px;">
        ${arr.length
          ? arr.map((x, idx) => `
            <div style="padding:8px 0; ${idx < arr.length - 1 ? "border-bottom:1px solid var(--line);" : ""}">
              <div style="font-weight:800;">${escapeHtml(x.symbol)} ${escapeHtml(x.name)}</div>
              <div class="small muted">價格 ${fmt(x.lastClose,2) ?? "—"} ｜ 評分 ${fmt(x.score,3) ?? "—"} ｜ ${escapeHtml(x.reason || "—")}</div>
            </div>
          `).join("")
          : `<div class="small muted" style="margin-top:8px;">目前此價格帶沒有符合條件的推薦。</div>`
        }
      </div>
    `;
    wrap.appendChild(div);
  });
}

async function loadMarket(){
  try{
    const r=await fetch(MARKET_URL,{cache:"no-store"});
    if(!r.ok) throw new Error("market.json not ready");
    const m=await r.json();

    const pill=el("marketPill");
    pill.className="pill";
    if((m.signal||"").includes("risk")) pill.classList.add("bad");
    else if((m.signal||"").includes("caution")) pill.classList.add("warn");
    else pill.classList.add("good");

    pill.textContent=m.label||m.signal||"—";
    el("marketMeta").textContent=`更新：${m.asOfLocal||m.generatedAt||"—"}`;
    el("marketMsg").textContent=m.message||"—";
    el("marketNote").textContent=m.note?`備註：${m.note}`:"";
  }catch(e){
    el("marketPill").textContent="—";
    el("marketMeta").textContent="尚未更新";
    el("marketMsg").textContent="等待 market.json 更新。";
    el("marketNote").textContent="";
  }
}

function render(data){
  el("updated").textContent = "更新時間：" + (data.generatedAt || "—");
  renderThemeList(data.hotThemes || []);
  renderBucketList(data.bucketPicks || {});

  const b = el("bucketSel").value;
  const picks = (data.picks || []).filter(p => inBucket(p.lastClose, b));

  el("pickSub").textContent = `共 ${picks.length} 檔`;
  el("emptyHint").style.display = picks.length ? "none" : "block";

  const list = el("pickList");
  list.innerHTML = "";

  picks.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="pick";
    div.innerHTML = renderPickCard(p, i);
    list.appendChild(div);
  });
}

async function loadToday(){
  const r = await fetch(TODAY_URL,{cache:"no-store"});
  if(!r.ok) throw new Error("today.json 讀取失敗：" + r.status);
  const d = await r.json();
  lastToday = d;
  render(d);
}

async function loadAll(){
  await Promise.allSettled([loadMarket(), loadToday()]);
}

document.addEventListener("DOMContentLoaded", () => {
  const btn = el("btnRefresh");
  const bucket = el("bucketSel");

  btn.addEventListener("click", async () => {
    const old = btn.textContent;
    try{
      btn.disabled = true;
      btn.textContent = "更新中…";
      await loadAll();
    }catch(e){
      alert(String(e?.message || e));
    }finally{
      btn.textContent = old;
      btn.disabled = false;
    }
  });

  bucket.addEventListener("change", () => {
    if(lastToday) render(lastToday);
  });

  loadAll().catch(()=>{});
});
</script>
</body>
</html>
